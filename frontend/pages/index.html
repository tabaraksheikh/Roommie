<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Roommie - Home</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="../styles/shared/common.css">
    <link rel="stylesheet" href="../styles/home/home.css">
</head>
<body data-page="home">

<div id="app-header"></div>
<div id="app-sidebar"></div>

<main class="main" id="main-content">
  <div class="page active" id="page-home">
    <section class="hero">
      <div id="hero-bg">
        <div class="hero-overlay"></div>
        <div class="hero-content">
          <h1>Find the right room and roommate without the chaos.</h1>
          <p>Browse student-friendly listings, compare spaces quickly, and connect with posters in one place.</p>
          <div class="hero-search">
            <input id="hero-search-input" type="text" placeholder="Search by city, district, or keyword"/>
            <button id="hero-browse-btn" type="button">Browse Rooms</button>
          </div>
        </div>
      </div>
    </section>

    <section class="featured-section">
      <div class="section-header">
        <div>
          <h2>Featured Rooms</h2>
        </div>
        <a href="browse.html" id="see-all-rooms-link">See all rooms</a>
      </div>
      <div class="rooms-grid" id="featured-rooms"></div>
    </section>

    <div id="app-footer"></div>
  </div>

  <div class="page" id="page-detail">
    <div class="detail-wrap">
      <button class="back-btn" id="detail-back-btn" type="button">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
        Back
      </button>
      <div class="detail-grid">
        <div>
          <div class="detail-img-placeholder" id="detail-img">Room</div>
          <div class="detail-meta">
            <span class="badge" id="detail-badge"></span>
            <span class="detail-location">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
              <span id="detail-location"></span>
            </span>
          </div>
          <h1 class="detail-title" id="detail-title"></h1>
          <p class="detail-desc" id="detail-desc"></p>
          <div class="detail-section-title">Amenities</div>
          <div class="amenity-tags" id="detail-amenities"></div>
          <div class="detail-section-title">Roommate Preferences</div>
          <div class="prefs-grid" id="detail-prefs"></div>
        </div>
        <div>
          <div class="booking-card">
            <div class="booking-price"><span id="detail-price"></span><span>/month</span></div>
            <hr class="booking-divider" style="margin-top:16px"/>
            <div id="detail-poster-card" class="poster-card">
              <div class="poster-avatar" id="detail-poster-emoji">&#128100;</div>
              <div><div class="poster-name" id="detail-poster-name"></div><div class="poster-sub" id="detail-poster-sub"></div></div>
              <div class="poster-arrow"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></div>
            </div>
            <hr class="booking-divider"/>
            <div class="contact-section-title">Contact Information</div>
            <div class="contact-info-row"><button id="detail-phone" type="button" class="contact-phone-btn"></button></div>
            <button class="btn-map" id="detail-map-btn" type="button"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l-6 3V6l6-3 6 3 6-3v15l-6 3-6-3z"/><path d="M9 3v15"/><path d="M15 6v15"/></svg>Open in Maps</button>
            <button class="btn-wa" id="detail-wa-btn" type="button"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>Chat on WhatsApp</button>
            <button class="btn-save" type="button"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>Save Listing</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="page" id="page-poster">
    <div class="poster-profile-wrap">
      <button class="back-btn" id="poster-back-btn" type="button">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
        Back
      </button>
      <div class="poster-profile-card">
        <div class="poster-big-avatar" id="poster-big-emoji">&#128100;</div>
        <div class="poster-profile-name" id="poster-big-name"></div>
        <div class="poster-profile-sub" id="poster-big-sub"></div>
        <div class="poster-tags" id="poster-big-tags"></div>
        <div class="poster-bio" id="poster-big-bio"></div>
      </div>
      <div class="poster-listings-title">Listings</div>
      <div id="poster-listings-grid"></div>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>
<script src="../scripts/api/api.js"></script>
  <script src="../scripts/layout/layout.js"></script>
  <script src="../scripts/layout/ui.js"></script>
  <script src="../scripts/listing/listing-normalize.js"></script>
  <script src="../scripts/listing/listing-card.js"></script>
  <script src="../scripts/listing/listing-save.js"></script>
  <script src="../scripts/listing/listing-poster.js"></script>
  <script src="../scripts/listing/listing-detail.js"></script>
  <script src="../scripts/auth/auth-modals.js"></script>
  <script src="../scripts/auth/auth.js"></script>
  <script src="../scripts/layout/init.js"></script>
  <script src="../scripts/pages/home.js"></script>
</body>
</html>
