<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hommie – Login / Register</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F5F2ED;
      --card: #FFFFFF;
      --ink: #1A1A1A;
      --muted: #6B6B6B;
      --accent: #D95F2B;
      --border: #E0DDD8;
      --error: #e53e3e;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.2rem 2.5rem;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.6rem;
      color: var(--ink);
      text-decoration: none;
    }

    .logo span { color: var(--accent); }

    .page-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
    }

    .auth-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.06);
    }

    .auth-card h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1.7rem;
      font-weight: 800;
      margin-bottom: 0.4rem;
    }

    .auth-card h1 span { color: var(--accent); }

    .auth-card p {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 2rem;
      line-height: 1.5;
    }

    /* TABS */
    .tabs {
      display: flex;
      background: var(--bg);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 1.8rem;
      gap: 4px;
    }

    .tab {
      flex: 1;
      text-align: center;
      padding: 0.55rem;
      border-radius: 8px;
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
      color: var(--muted);
      transition: all 0.2s;
      border: none;
      background: transparent;
      font-family: 'DM Sans', sans-serif;
    }

    .tab.active {
      background: var(--card);
      color: var(--ink);
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    /* FORM */
    .form-group {
      margin-bottom: 1.1rem;
    }

    label {
      display: block;
      font-size: 0.83rem;
      font-weight: 500;
      margin-bottom: 0.4rem;
      color: var(--ink);
    }

    input[type="text"],
    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 0.7rem 1rem;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      color: var(--ink);
      background: #fff;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: var(--accent); }

    .btn {
      width: 100%;
      padding: 0.75rem;
      border-radius: 8px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      margin-top: 0.5rem;
    }

    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #c2501f; }

    .divider {
      text-align: center;
      font-size: 0.8rem;
      color: var(--muted);
      margin: 1.2rem 0;
      position: relative;
    }

    .divider::before, .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 42%;
      height: 1px;
      background: var(--border);
    }

    .divider::before { left: 0; }
    .divider::after { right: 0; }

    .switch-text {
      text-align: center;
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 1.2rem;
    }

    .switch-text a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
      cursor: pointer;
    }

    /* panels */
    .panel { display: none; }
    .panel.active { display: block; }

    /* preferences section in register */
    .prefs-label {
      font-size: 0.83rem;
      font-weight: 500;
      margin-bottom: 0.6rem;
      color: var(--ink);
      display: block;
    }

    .prefs-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
      margin-bottom: 1.1rem;
    }

    .pref-option {
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 0.5rem 0.7rem;
      font-size: 0.82rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      color: var(--muted);
      transition: all 0.2s;
      background: #fff;
    }

    .pref-option input { display: none; }

    .pref-option:has(input:checked),
    .pref-option.selected {
      border-color: var(--accent);
      color: var(--accent);
      background: #fce8de;
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="logo">hom<span>mie</span></a>
  </nav>

  <div class="page-wrap">
    <div class="auth-card">
      <h1>Welcome to <span>hommie</span></h1>
      <p>Find your next room or the perfect roommate.</p>

      <!-- TABS -->
      <div class="tabs">
        <button class="tab active" onclick="switchTab('login')">Log in</button>
        <button class="tab" onclick="switchTab('register')">Sign up</button>
      </div>

      <!-- LOGIN PANEL -->
      <div class="panel active" id="login-panel">
        <div class="form-group">
          <label>Email address</label>
          <input type="email" placeholder="you@university.edu" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" placeholder="••••••••" />
        </div>
        <button class="btn btn-primary" onclick="window.location.href='index.html'">Log in</button>
        <div class="switch-text">
          Don't have an account? <a onclick="switchTab('register')">Sign up</a>
        </div>
      </div>

      <!-- REGISTER PANEL -->
      <div class="panel" id="register-panel">
        <div class="form-group">
          <label>Full name</label>
          <input type="text" placeholder="Your name" />
        </div>
        <div class="form-group">
          <label>Email address</label>
          <input type="email" placeholder="you@university.edu" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" placeholder="At least 8 characters" />
        </div>

        <span class="prefs-label">Your lifestyle preferences</span>
        <div class="prefs-grid">
          <label class="pref-option">
            <input type="checkbox"> 🚭 Non-smoker
          </label>
          <label class="pref-option">
            <input type="checkbox"> 🚬 Smoker ok
          </label>
          <label class="pref-option">
            <input type="checkbox"> 🌅 Early bird
          </label>
          <label class="pref-option">
            <input type="checkbox"> 🌙 Night owl
          </label>
          <label class="pref-option">
            <input type="checkbox"> 🤫 Quiet
          </label>
          <label class="pref-option">
            <input type="checkbox"> 🎉 Social
          </label>
        </div>

        <button class="btn btn-primary" onclick="window.location.href='index.html'">Create account</button>
        <div class="switch-text">
          Already have an account? <a onclick="switchTab('login')">Log in</a>
        </div>
      </div>

    </div>
  </div>

  <script>
    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach((t, i) => {
        t.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'register' && i === 1));
      });
      document.getElementById('login-panel').classList.toggle('active', tab === 'login');
      document.getElementById('register-panel').classList.toggle('active', tab === 'register');
    }

    // pref option toggle visual
    document.querySelectorAll('.pref-option input').forEach(cb => {
      cb.addEventListener('change', () => {
        cb.closest('.pref-option').classList.toggle('selected', cb.checked);
      });
    });
  </script>
</body>
</html>
